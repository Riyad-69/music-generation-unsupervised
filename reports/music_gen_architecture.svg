<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Unsupervised Music Generation — System Architecture</text>
  <text x="450" y="48" text-anchor="middle" font-size="12" fill="#666666">CSE425 Neural Networks Project · MD READ AL RASID · 22101201</text>

  <!-- ── DATA LAYER ── -->
  <rect x="30" y="65" width="840" height="80" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="48" y="82" font-size="11" font-weight="bold" fill="#5F5E5A">DATA LAYER</text>
  <!-- Groove MIDI -->
  <rect x="50" y="88" width="160" height="44" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="1"/>
  <text x="130" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Groove MIDI</text>
  <text x="130" y="124" text-anchor="middle" font-size="11" fill="#444441">raw drum sequences</text>
  <!-- Lakh MIDI -->
  <rect x="230" y="88" width="160" height="44" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="1"/>
  <text x="310" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Lakh MIDI</text>
  <text x="310" y="124" text-anchor="middle" font-size="11" fill="#444441">multi-genre subset</text>

  <!-- ── PREPROCESSING LAYER ── -->
  <rect x="30" y="175" width="840" height="88" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="48" y="192" font-size="11" font-weight="bold" fill="#534AB7">PREPROCESSING LAYER</text>
  <!-- Piano-roll encoder -->
  <rect x="50" y="200" width="185" height="50" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
  <text x="142" y="221" text-anchor="middle" font-size="13" font-weight="bold" fill="#26215C">Piano-roll encoder</text>
  <text x="142" y="238" text-anchor="middle" font-size="11" fill="#3C3489">prepocessing.py → processed_data.npy</text>
  <!-- Tokenizer -->
  <rect x="260" y="200" width="185" height="50" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
  <text x="352" y="221" text-anchor="middle" font-size="13" font-weight="bold" fill="#26215C">Tokenizer</text>
  <text x="352" y="238" text-anchor="middle" font-size="11" fill="#3C3489">transformer_preprocess.py → token_data.npy</text>

  <!-- ── MODEL LAYER ── -->
  <rect x="30" y="295" width="840" height="190" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="48" y="312" font-size="11" font-weight="bold" fill="#0F6E56">MODEL LAYER</text>

  <!-- VAE box -->
  <rect x="50" y="320" width="220" height="148" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="160" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342C">VAE (Task 2)</text>
  <line x1="50" y1="348" x2="270" y2="348" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="160" y="364" text-anchor="middle" font-size="11" fill="#085041">Input: piano-roll (128 × T)</text>
  <text x="160" y="380" text-anchor="middle" font-size="11" fill="#085041">Encoder LSTM → μ, σ</text>
  <text x="160" y="396" text-anchor="middle" font-size="11" fill="#085041">Latent space z ~ N(μ, σ²)</text>
  <text x="160" y="412" text-anchor="middle" font-size="11" fill="#085041">Decoder LSTM → piano-roll</text>
  <text x="160" y="428" text-anchor="middle" font-size="11" fill="#085041">Loss: KL divergence + recon</text>
  <text x="160" y="448" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F6E56">→ vae_model.pth</text>

  <!-- Transformer box -->
  <rect x="300" y="320" width="220" height="148" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="410" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342C">Transformer (Task 3)</text>
  <line x1="300" y1="348" x2="520" y2="348" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="410" y="364" text-anchor="middle" font-size="11" fill="#085041">Input: token_data.npy</text>
  <text x="410" y="380" text-anchor="middle" font-size="11" fill="#085041">Token embedding layer</text>
  <text x="410" y="396" text-anchor="middle" font-size="11" fill="#085041">Multi-head self-attention</text>
  <text x="410" y="412" text-anchor="middle" font-size="11" fill="#085041">Feed-forward + layer norm</text>
  <text x="410" y="428" text-anchor="middle" font-size="11" fill="#085041">Autoregressive decoding</text>
  <text x="410" y="448" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F6E56">→ perplexity score</text>

  <!-- RLHF box -->
  <rect x="550" y="320" width="220" height="148" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="660" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342C">RLHF (Task 4)</text>
  <line x1="550" y1="348" x2="770" y2="348" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="660" y="364" text-anchor="middle" font-size="11" fill="#085041">Pre-trained Transformer</text>
  <text x="660" y="380" text-anchor="middle" font-size="11" fill="#085041">Human preference labels</text>
  <text x="660" y="396" text-anchor="middle" font-size="11" fill="#085041">Reward model training</text>
  <text x="660" y="412" text-anchor="middle" font-size="11" fill="#085041">Policy gradient update</text>
  <text x="660" y="428" text-anchor="middle" font-size="11" fill="#085041">task4_rlhf.py</text>
  <text x="660" y="448" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F6E56">→ improved MIDI</text>

  <!-- RLHF feedback arrow -->
  <path d="M 770 394 L 800 394 L 800 306 L 520 306 L 520 320" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="5 3" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="662" y="300" text-anchor="middle" font-size="10" fill="#993C1D">fine-tunes →</text>

  <!-- ── EVALUATION LAYER ── -->
  <rect x="30" y="515" width="840" height="80" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="48" y="532" font-size="11" font-weight="bold" fill="#993C1D">EVALUATION LAYER  (metrics.py · evaluate.py)</text>
  <!-- Metric boxes -->
  <rect x="50" y="540" width="155" height="40" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="127" y="558" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A1B0C">Pitch histogram</text>
  <text x="127" y="572" text-anchor="middle" font-size="10" fill="#712B13">similarity score</text>

  <rect x="222" y="540" width="155" height="40" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="299" y="558" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A1B0C">Rhythm diversity</text>
  <text x="299" y="572" text-anchor="middle" font-size="10" fill="#712B13">onset variance</text>

  <rect x="394" y="540" width="155" height="40" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="471" y="558" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A1B0C">Repetition ratio</text>
  <text x="471" y="572" text-anchor="middle" font-size="10" fill="#712B13">n-gram overlap</text>

  <rect x="566" y="540" width="140" height="40" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="636" y="558" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A1B0C">Human eval</text>
  <text x="636" y="572" text-anchor="middle" font-size="10" fill="#712B13">preference score</text>

  <!-- ── ARROWS ── -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Data → Preprocessing -->
  <line x1="130" y1="132" x2="142" y2="200" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="310" y1="132" x2="352" y2="200" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Piano-roll → VAE -->
  <line x1="142" y1="250" x2="160" y2="320" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrPurple)"/>
  <!-- Tokenizer → Transformer -->
  <line x1="352" y1="250" x2="410" y2="320" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrPurple)"/>
  <!-- Tokenizer → RLHF (L-bend) -->
  <path d="M 445 250 L 445 280 L 660 280 L 660 320" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrPurple)" fill="none"/>

  <!-- Models → Evaluation -->
  <line x1="160" y1="468" x2="160" y2="515" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrGreen)"/>
  <line x1="410" y1="468" x2="350" y2="515" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrGreen)"/>
  <line x1="660" y1="468" x2="560" y2="515" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrGreen)"/>

  <!-- Legend -->
  <text x="450" y="608" text-anchor="middle" font-size="10" fill="#999999">--- dashed arrow = fine-tuning feedback loop</text>
</svg>
